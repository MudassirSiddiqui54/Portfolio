<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hex-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#bf00ff" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="m-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#bf00ff"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#bf00ff"/>
    </linearGradient>
  </defs>

  <polygon points="340,60 461,130 461,270 340,340 219,270 219,130" fill="url(#hex-grad)" stroke="url(#border-grad)" stroke-width="2.5" style="color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Crown M as strokes only, thin lines -->
  <polyline points="265,255 265,148 302,188 340,148 378,188 415,148 415,255" fill="none" stroke="url(#m-grad)" stroke-width="12" stroke-linejoin="miter" stroke-linecap="square" style="fill:none;color:rgb(255, 255, 255);stroke-width:12px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>